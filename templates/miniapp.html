<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Reelay</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #17212b);
    --text: var(--tg-theme-text-color, #f5f5f5);
    --hint: var(--tg-theme-hint-color, #7d8b99);
    --card: var(--tg-theme-secondary-bg-color, #232e3c);
    --btn: var(--tg-theme-button-color, #3390ec);
    --btn-text: var(--tg-theme-button-text-color, #fff);
    --link: var(--tg-theme-link-color, #6ab3f3);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); font-size: 15px; padding-bottom: 72px;
  }
  header { padding: 14px 16px 8px; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .sub { color: var(--hint); font-size: 13px; margin-top: 2px; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 16px 4px; }
  .chip { background: var(--card); border-radius: 14px; padding: 5px 10px; font-size: 12px; color: var(--hint); }
  .chip b { color: var(--text); }
  .tabs { display: flex; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid rgba(128,128,128,.15); }
  .tabs button { flex: 1; background: none; border: none; color: var(--hint);
    padding: 10px 0 12px; font-size: 12px; cursor: pointer; }
  .tabs button.active { color: var(--btn); }
  .tabs .ico { display: block; font-size: 19px; margin-bottom: 2px; }
  .panel { display: none; padding: 8px 12px 12px; }
  .panel.active { display: block; }
  .card { background: var(--card); border-radius: 12px; padding: 12px; margin: 8px 0;
    display: flex; gap: 12px; align-items: flex-start; }
  .card img { width: 46px; height: 69px; object-fit: cover; border-radius: 6px; flex: 0 0 auto; background: rgba(128,128,128,.2); }
  .card .body { flex: 1; min-width: 0; }
  .card .t { font-weight: 600; }
  .card .m { color: var(--hint); font-size: 13px; margin-top: 3px; }
  .badge { font-size: 12px; margin-top: 4px; }
  .mine { color: var(--link); font-size: 11px; }
  .req-btn { background: var(--btn); color: var(--btn-text); border: none; border-radius: 8px;
    padding: 8px 12px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .req-btn:disabled { opacity: .5; }
  .progress { height: 6px; background: rgba(128,128,128,.25); border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .progress > i { display: block; height: 100%; background: var(--btn); }
  .search { display: flex; gap: 8px; padding: 4px 4px 8px; }
  .search input { flex: 1; background: var(--card); border: none; border-radius: 10px;
    padding: 10px 12px; color: var(--text); font-size: 15px; }
  .seg { display: flex; background: var(--card); border-radius: 10px; overflow: hidden; margin: 4px 4px 6px; }
  .seg button { flex: 1; background: none; border: none; color: var(--hint); padding: 8px; font-size: 13px; cursor: pointer; }
  .seg button.active { background: var(--btn); color: var(--btn-text); }
  .empty { color: var(--hint); text-align: center; padding: 32px 16px; }
  .toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
    background: var(--card); color: var(--text); padding: 10px 16px; border-radius: 20px;
    font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; box-shadow: 0 2px 12px rgba(0,0,0,.3); }
  .toast.show { opacity: 1; }
  .section-title { font-size: 12px; color: var(--hint); text-transform: uppercase;
    letter-spacing: .04em; margin: 16px 4px 6px; }
  .section-title:first-child { margin-top: 4px; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .row .name { font-weight: 600; }
  .row .m { color: var(--hint); font-size: 13px; margin-top: 2px; }
  .btn { background: var(--btn); color: var(--btn-text); border: none; border-radius: 8px;
    padding: 8px 12px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn.secondary { background: rgba(128,128,128,.25); color: var(--text); }
  .btn:disabled { opacity: .5; }
  .btn-row { display: flex; gap: 8px; }
  .role-select { background: rgba(128,128,128,.2); color: var(--text); border: none;
    border-radius: 8px; padding: 6px 8px; font-size: 13px; }
  .invite-code { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 18px;
    letter-spacing: .06em; background: rgba(128,128,128,.15); border-radius: 8px;
    padding: 8px 12px; display: inline-block; }
  .spinner { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(128,128,128,.3);
    border-top-color: var(--btn); display: inline-block; vertical-align: -3px; margin-right: 6px;
    animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <header>
    <h1 id="scopeTitle">Reelay</h1>
    <div class="sub" id="sub"></div>
  </header>

  <div class="panel active" id="p-requests">
    <div class="chips" id="counts"></div>
    <div id="requests"></div>
  </div>

  <div class="panel" id="p-queue">
    <div id="queue"></div>
  </div>

  <div class="panel" id="p-browse">
    <div class="seg">
      <button data-type="movie" class="active">🎬 Movies</button>
      <button data-type="tv">📺 Shows</button>
    </div>
    <div class="search">
      <input id="q" placeholder="Search to request…" autocomplete="off">
    </div>
    <div id="results"></div>
  </div>

  <div class="panel" id="p-account">
    <div id="account"></div>
  </div>

  <div class="panel" id="p-admin">
    <div id="admin"></div>
  </div>

  <nav class="tabs">
    <button data-tab="requests" class="active"><span class="ico">📥</span>Requests</button>
    <button data-tab="queue" id="tab-queue" style="display:none"><span class="ico">⬇️</span>Queue</button>
    <button data-tab="browse"><span class="ico">🔍</span>Browse</button>
    <button data-tab="account"><span class="ico">👤</span>Account</button>
    <button data-tab="admin" id="tab-admin" style="display:none"><span class="ico">🛠️</span>Admin</button>
  </nav>

  <div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

const H = s => (s == null ? "" : String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])));
const el = id => document.getElementById(id);

async function api(path, opts = {}) {
  opts.headers = Object.assign({ "X-Telegram-Init-Data": tg.initData }, opts.headers || {});
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text().catch(() => r.status));
  return r.json();
}

let toastTimer;
function toast(msg) {
  const t = el("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

function icon(mt) { return mt === "tv" ? "📺" : "🎬"; }

function renderRequests(data) {
  const c = el("counts"); c.innerHTML = "";
  const co = data.counts || {};
  const chip = (label, v) => v != null ? `<span class="chip">${label} <b>${v}</b></span>` : "";
  c.innerHTML = chip("Pending", co.pending) + chip("Processing", co.processing) + chip("Available", co.available);

  const box = el("requests");
  if (!data.overseerrEnabled) { box.innerHTML = `<div class="empty">Overseerr isn't configured.</div>`; return; }
  if (!data.requests.length) { box.innerHTML = `<div class="empty">No requests yet.</div>`; return; }
  box.innerHTML = data.requests.map(r => `
    <div class="card">
      <div class="body">
        <div class="t">${icon(r.mediaType)} ${H(r.title)}</div>
        <div class="badge">${H(r.statusLabel)}</div>
        ${r.mine ? `<div class="mine">requested by you</div>` : ``}
      </div>
    </div>`).join("");
}

async function loadQueue() {
  const box = el("queue"); box.innerHTML = `<div class="empty">Loading…</div>`;
  try {
    const items = await api("/api/queue");
    if (!items.length) { box.innerHTML = `<div class="empty">Nothing downloading.</div>`; return; }
    box.innerHTML = items.map(q => `
      <div class="card">
        <div class="body">
          <div class="t">${icon(q.mediaType)} ${H(q.title)}</div>
          <div class="m">${q.progress}% · ${H(q.timeleft) || H(q.status)}</div>
          <div class="progress"><i style="width:${q.progress}%"></i></div>
        </div>
      </div>`).join("");
  } catch (e) { box.innerHTML = `<div class="empty">Couldn't load the queue.</div>`; }
}

let browseType = "movie", searchTimer;
async function doSearch() {
  const q = el("q").value.trim();
  const box = el("results");
  if (!q) { box.innerHTML = ""; return; }
  box.innerHTML = `<div class="empty">Searching…</div>`;
  try {
    const items = await api(`/api/catalog?type=${browseType}&q=${encodeURIComponent(q)}`);
    if (!items.length) { box.innerHTML = `<div class="empty">No matches.</div>`; return; }
    box.innerHTML = items.map((m, i) => `
      <div class="card">
        ${m.poster ? `<img src="${H(m.poster)}" loading="lazy">` : `<img>`}
        <div class="body">
          <div class="t">${H(m.title)} ${m.year ? `<span class="m">(${H(m.year)})</span>` : ``}</div>
          <div class="badge">${H(statusBadge(m.status))}</div>
        </div>
        <button class="req-btn" data-i="${i}">Request</button>
      </div>`).join("");
    box.querySelectorAll(".req-btn").forEach(b => b.addEventListener("click", () => request(items[+b.dataset.i], b)));
  } catch (e) { box.innerHTML = `<div class="empty">Search failed.</div>`; }
}

function statusBadge(s) {
  return ({2:"⏳ Requested",3:"⏳ Processing",4:"🟡 Partially available",5:"✅ Available"})[s] || "➕ Not requested";
}

async function request(item, btn) {
  btn.disabled = true; btn.textContent = "…";
  try {
    const res = await api("/api/request", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mediaType: browseType, mediaId: item.id, title: item.title })
    });
    if (res.ok) { btn.textContent = "✅"; toast("Requested " + item.title); if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success"); }
    else { btn.disabled = false; btn.textContent = "Request"; toast(res.error === "not_linked" ? "Link your account: /linkme" : "Couldn't request"); }
  } catch (e) { btn.disabled = false; btn.textContent = "Request"; toast("Couldn't request"); }
}

// --- Account / Plex linking -----------------------------------------------

function renderAccount(data) {
  const box = el("account");
  if (data.linked) {
    box.innerHTML = `
      <div class="section-title">Your account</div>
      <div class="card"><div class="body">
        <div class="t">✅ Linked to Plex</div>
        <div class="m">${H(data.seerrUsername || "")}</div>
      </div></div>`;
    return;
  }
  box.innerHTML = `
    <div class="section-title">Your account</div>
    <div class="card"><div class="body">
      <div class="t">Not linked</div>
      <div class="m">Connect your Plex account so requests and reminders are attributed to you.</div>
    </div></div>
    <div style="margin:10px 4px">
      <button class="btn" id="plex-connect">Connect Plex</button>
      <div id="plex-status" class="m" style="margin-top:8px"></div>
      <button class="btn secondary" id="plex-recheck" style="display:none;margin-top:8px">I've approved — check now</button>
    </div>`;
  el("plex-connect").addEventListener("click", startPlexLink);
  el("plex-recheck").addEventListener("click", () => pollPlexLink(true));
}

let plexPollTimer = null, plexPollTries = 0, plexPinId = null;

async function startPlexLink() {
  const btn = el("plex-connect"), status = el("plex-status"), recheck = el("plex-recheck");
  btn.disabled = true;
  try {
    const res = await api("/api/plex/start", { method: "POST" });
    plexPinId = res.pinId;
    tg.openLink(res.authUrl);
    btn.style.display = "none";
    recheck.style.display = "";
    status.innerHTML = `<span class="spinner"></span>Waiting for you to approve in the browser…`;
    plexPollTries = 0;
    schedulePlexPoll();
  } catch (e) {
    btn.disabled = false;
    toast("Couldn't start Plex link");
  }
}

function schedulePlexPoll() {
  clearTimeout(plexPollTimer);
  plexPollTimer = setTimeout(() => pollPlexLink(false), 2500);
}

async function pollPlexLink(manual) {
  if (!plexPinId) return;
  const status = el("plex-status");
  if (!status) return;
  plexPollTries++;
  try {
    const res = await api(`/api/plex/poll?pinId=${plexPinId}`);
    if (res.status === "linked") {
      clearTimeout(plexPollTimer);
      toast(`Linked as ${res.displayName}!`);
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
      const data = await api("/api/bootstrap");
      el("sub").textContent = `${data.displayName} · ${data.role}${data.linked ? "" : " · not linked"}`;
      renderAccount(data);
      renderRequests(data);
      return;
    }
    if (res.status === "error" || res.status === "expired") {
      clearTimeout(plexPollTimer);
      toast("Couldn't link Plex — try again");
      renderAccount({ linked: false });
      return;
    }
    if (plexPollTries < 48) schedulePlexPoll();
  } catch (e) {
    if (manual) toast("Still waiting…");
    if (plexPollTries < 48) schedulePlexPoll();
  }
}

// --- Admin: member management -----------------------------------------------

async function loadAdmin() {
  const box = el("admin");
  box.innerHTML = `<div class="empty">Loading…</div>`;
  try {
    const data = await api("/api/admin/members");
    renderAdmin(data);
  } catch (e) {
    box.innerHTML = `<div class="empty">Couldn't load admin panel.</div>`;
  }
}

function renderAdmin(data) {
  const box = el("admin");
  let html = `
    <div class="section-title">Invite</div>
    <div class="card"><div class="body">
      <div class="invite-code">${H(data.invite.code)}</div>
      <div class="m" style="margin-top:6px">Have them DM the bot: <b>/join ${H(data.invite.code)}</b></div>
      <div class="btn-row" style="margin-top:10px">
        <button class="btn secondary" id="invite-copy">Copy code</button>
        <button class="btn secondary" id="invite-share">Share</button>
      </div>
    </div></div>`;

  html += `<div class="section-title">Pending requests</div>`;
  html += data.pending.length ? data.pending.map(p => `
    <div class="card row">
      <div class="body"><div class="name">${H(p.username)}</div></div>
      <div class="btn-row">
        <button class="btn" data-approve="${H(p.userId)}">Approve</button>
        <button class="btn secondary" data-deny="${H(p.userId)}">Deny</button>
      </div>
    </div>`).join("") : `<div class="empty">No pending requests.</div>`;

  html += `<div class="section-title">Members</div>`;
  html += data.members.map(m => `
    <div class="card row">
      <div class="body">
        <div class="name">${H(m.username)}</div>
        <div class="m">${m.linked ? "✅ " + H(m.seerrUsername || "linked") : "Not linked"}</div>
      </div>
      <select class="role-select" data-role="${H(m.userId)}">
        ${["member", "editor", "admin"].map(r => `<option value="${r}"${r === m.role ? " selected" : ""}>${r}</option>`).join("")}
      </select>
    </div>`).join("");

  box.innerHTML = html;

  el("invite-copy").addEventListener("click", () => {
    if (navigator.clipboard) navigator.clipboard.writeText(data.invite.code);
    toast("Invite code copied");
  });
  el("invite-share").addEventListener("click", () => {
    const msg = `Join our Reelay household: DM the bot /join ${data.invite.code}`;
    if (tg.openTelegramLink) tg.openTelegramLink("https://t.me/share/url?url=&text=" + encodeURIComponent(msg));
  });
  box.querySelectorAll("[data-approve]").forEach(b => b.addEventListener("click", () => adminAction(b.dataset.approve, "approve")));
  box.querySelectorAll("[data-deny]").forEach(b => b.addEventListener("click", () => adminAction(b.dataset.deny, "deny")));
  box.querySelectorAll(".role-select").forEach(s => s.addEventListener("change", () => setRole(s.dataset.role, s.value)));
}

async function adminAction(userId, action) {
  try {
    await api(`/api/admin/members/${userId}/${action}`, { method: "POST" });
    toast(action === "approve" ? "Approved" : "Denied");
    loadAdmin();
  } catch (e) { toast("Couldn't update"); }
}

async function setRole(userId, role) {
  try {
    await api(`/api/admin/members/${userId}/role`, {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ role })
    });
    toast("Role updated");
  } catch (e) {
    let msg = "Couldn't update role";
    try { if (JSON.parse(e.message).error === "last_admin") msg = "Can't remove the last admin"; } catch (_) {}
    toast(msg);
    loadAdmin();
  }
}

// Tabs
document.querySelectorAll(".tabs button").forEach(b => b.addEventListener("click", () => {
  const tab = b.dataset.tab;
  document.querySelectorAll(".tabs button").forEach(x => x.classList.toggle("active", x === b));
  document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === "p-" + tab));
  if (tab === "queue") loadQueue();
  if (tab === "admin") loadAdmin();
}));
// Browse type toggle
document.querySelectorAll(".seg button").forEach(b => b.addEventListener("click", () => {
  browseType = b.dataset.type;
  document.querySelectorAll(".seg button").forEach(x => x.classList.toggle("active", x === b));
  doSearch();
}));
el("q").addEventListener("input", () => { clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 350); });

// Boot
(async () => {
  try {
    const data = await api("/api/bootstrap");
    el("scopeTitle").textContent = data.scopeTitle;
    el("sub").textContent = `${data.displayName} · ${data.role}${data.linked ? "" : " · not linked"}`;
    if (data.canSeeQueue) el("tab-queue").style.display = "";
    if (data.isAdmin) el("tab-admin").style.display = "";
    renderRequests(data);
    renderAccount(data);
  } catch (e) {
    document.body.innerHTML = `<div class="empty">Couldn't load. ${H(String(e.message || e))}</div>`;
  }
})();
</script>
</body>
</html>
