# Sonarr Configuration
sonarr:
  server:
    addr: 
    port : 8989 # Default is 8989
    path: / # Default is / . If set, it must start and finish with / . Eg: /sonarr/
    ssl: false # Default false
  auth:
    apikey: 
    username: 
    password:
  search: true # Start search after adding series
  seasonFolder: true
  excludedRootFolders: # If set must not have a trailing slash Eg: /mnt/Media
    - # First excluded folder, add others with a "-" on a new line (same indentation)
  narrowRootFolderNames: true # If true, only the last folder name will be shown instead of full path
  excludedQualityProfiles:
    - 
  defaultTags: # If set must be existing tags
    - telegram
  addRequesterIdTag: true # Add telegram user id as tag on series
  adminRestrictions: false

# Radarr Configuration
radarr:
  server:
    addr:
    port : 7878 # Default is 7878
    path: / # Default is / . If set, it must start and finish with / . Eg: /radarr/
    ssl: false # Default false
  auth:
    apikey:
    username:
    password:  # Start search after adding movie
  search: true
  minimumAvailability: announced
  excludedRootFolders: # If set must not have a trailing slash Eg: /mnt/Media
    - # First excluded folder, add others with a "-" on a new line (same indentation)
  narrowRootFolderNames: true #If true, only the last folder name will be shown instead of full path
  excludedQualityProfiles:
    - 
  defaultTags: # If set must be existing tags
    - telegram
  addRequesterIdTag: true # Add telegram user id as tag on movie
  adminRestrictions: false
  
# Telegram Configuration
telegram:
  token:
  password:

# Transmission Configuration
transmission:
  enable: true # Enable the Transmission commands
  onlyAdmin: true # Transmission command  will only work for admins
  host: # IP-adres of the Transmission service
  authentication: true # Is Transmission protected with a password?
  username: 
  password:

sabnzbd:
  enable: true
  onlyAdmin: true
  server:
    addr:
    port: 8090 # Default is 8090
    path: / # Default is / . If set, it must start and finish with / . Eg: /sonarr/
    ssl: false # Default false
  auth:
    apikey:
    username:
    password:

# Overseerr/Jellyseerr Configuration (optional, powers watched-aware reminders)
overseerr:
  enable: false
  url: # e.g. http://your-overseerr-ip:5055
  apikey:
  # Optional: enable the status webhook (approved/available/failed -> #updates
  # topic). Pick any long random string. Then in Overseerr → Settings →
  # Notifications → Webhook, set the URL to:
  #   https://<your-reelay-host>/overseerr/webhook/<this-secret>
  # (uses the same server/port as the Mini App). See docs for the JSON payload.
  webhookSecret:

# How many days to wait, by default, before nudging a user to watch
# something they requested if they haven't answered the onboarding question.
reminderDefaultDays: 3
# Local hour (0-23) the daily reminder check runs at.
reminderCheckHour: 9

# Telegram Mini App dashboard (view requests, download queue, browse & request).
# Requires a public HTTPS URL (Telegram won't load a Mini App over plain HTTP) --
# the shipped docker-compose provides this via a Cloudflare tunnel sidecar.
miniapp:
  enable: false
  url: # public HTTPS URL, e.g. https://reelay.yourdomain.com/miniapp/
  listenHost: 0.0.0.0
  listenPort: 8080

# Weekly "what's new" digest. Records availability from the Overseerr webhook
# (see overseerr.webhookSecret above) and, once a week, posts a library-wide
# roundup into each group's #updates topic (set with /routehere updates) and
# DMs each member the items they personally requested that went available.
weeklyDigest:
  enable: false
  day: monday   # monday..sunday
  hour: 9       # local hour, 0-23

# Optional settings:
## Language
language: en-us # de-de, en-us, es-es, fr-fr, it-it, nl-be, pl-pl, pt-pt, ru-ru

## Entrypoints
entrypointAuth: auth # auth or a custom entrypoint
entrypointHelp: help # help entrypoint
entrypointAdd: start # start or a custom entrypoint
entrypointAllSeries: allSeries # allSeries or a custom entrypoint
entrypointAllMovies: allMovies # allMovies or a custom entrypoint
entrypointTransmission: transmission # transmission or a custom entrypoint
entrypointSabnzbd: sabnzbd # sabnzbd or a custom entrypoint

## Restrict some commands to only admins and/or provide extra authorization by usernames
enableAdmin: false # Check admin.txt
enableAllowlist: false # Check allowlist.txt - very restrictive!

## Logging
logToConsole: true
debugLogging: false
adminNotifyId:
